trigger:
  branches:
    include:
      - main

variables:
  acrName: 'chethanacr'
  acrLoginServer: 'chethanacr.azurecr.io'
  imageRepository: 'react-app'
  webAppName: 'currenyconverter'
  resourceGroup: 'VisualStudioOnline-1A886EF701544FD2B60F6F2448C5C6EB'
  dockerfilePath: '$(Build.SourcesDirectory)/Dockerfile'
  tag: '$(Build.BuildId)'

stages:

# ─── STAGE 1: BUILD & PUSH IMAGE TO ACR ───────────────────────────
- stage: Build
  displayName: 'Build and Push Docker Image'
  jobs:
  - job: BuildJob
    pool:
      vmImage: 'ubuntu-latest'
    steps:

    - task: Docker@2
      displayName: 'Build Docker Image'
      inputs:
        command: build
        containerRegistry: 'app-acr'
        repository: '$(imageRepository)'
        dockerfile: '$(dockerfilePath)'
        tags: |
          $(tag)
          latest

    - task: Docker@2
      displayName: 'Push Image to ACR'
      inputs:
        command: push
        containerRegistry: 'app-acr'
        repository: '$(imageRepository)'
        tags: |
          $(tag)
          latest

# ─── STAGE 2: TEST ────────────────────────────────────────────────
- stage: Test
  displayName: 'Run Tests'
  dependsOn: Build
  condition: succeeded()
  jobs:
  - job: TestJob
    pool:
      vmImage: 'ubuntu-latest'
    steps:

    - task: NodeTool@0
      displayName: 'Install Node.js'
      inputs:
        versionSpec: '20.x'

    - script: npm install
      displayName: 'Install Dependencies'

    - script: npm test -- --watchAll=false --passWithNoTests
      displayName: 'Run Unit Tests'

# ─── STAGE 3: DEPLOY TO AZURE WEB APP ─────────────────────────────
- stage: Deploy
  displayName: 'Deploy to Azure Web App'
  dependsOn: Test
  condition: succeeded()
  jobs:
  - deployment: DeployJob
    displayName: 'Deploy Container to Web App'
    environment: 'production'
    pool:
      vmImage: 'ubuntu-latest'
    strategy:
      runOnce:
        deploy:
          steps:
          - task: AzureWebAppContainer@1
            displayName: 'Deploy to Azure Web App as Container'
            inputs:
              azureSubscription: 'app-rm'
              appName: '$(webAppName)'
              resourceGroupName: '$(resourceGroup)'
              containers: '$(acrLoginServer)/$(imageRepository):$(tag)'